# Unified Domains Worker Configuration
name = "unified-domains-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# Environment Variables
[env.production.vars]
WORKER_DOMAIN = "unified-domains-worker.samihalawa.workers.dev"
# Optional: set to enable Netlify integration in /api/dashboard/domains
# NETLIFY_TOKEN = "${NETLIFY_TOKEN}"
# Optional: set to enable Cloudflare Zones enrichment
# CLOUDFLARE_API_TOKEN = "${CLOUDFLARE_API_TOKEN}"

# Notes:
# - The worker caches Cloudflare zones for ~120s and Netlify sites for ~60s via caches.default.

# Secrets (use wrangler secret put to set these)
# AIRTABLE_TOKEN = "patn9EcWwQcOQtP2A.084bc3ecf3d4493db9e4bc215f31a10de83cb9486a1d277c4fdb8a869b379622"
# AIRTABLE_BASE = "appLattdbxMhK4I0y"  # Multidomain Management base

# Cron triggers for automated content generation
[triggers]
crons = ["0 */2 * * *"]  # Every 2 hours

# Routes for all domains - commented out for initial deployment
# Add route bindings later via Cloudflare dashboard or proper zone management
# [[routes]]
# pattern = "*.yourdomain.com/*"
# zone_id = "your_zone_id"
