name = "domains-monorepo"
main = "index.js"
compatibility_date = "2024-12-20"

# Environment variables
# NEVER commit tokens to git! Use wrangler secret instead:
# npx wrangler secret put CF_API_TOKEN
[vars]
WORKER_DOMAIN = "trigox.workers.dev"

[env.production.vars]
# CF_API_TOKEN should be set as a secret, not here

# Routes for domains served by this worker (excludes Netlify-hosted domains)
routes = [
  { pattern = "damecoins.com/*", zone_name = "damecoins.com" },
  { pattern = "gptcoins.com/*", zone_name = "gptcoins.com" },
  # REMOVED: detectar.ai - hosted on Netlify
  { pattern = "empleados.ai/*", zone_name = "empleados.ai" },
  { pattern = "instantvirtualcards.com/*", zone_name = "instantvirtualcards.com" },
  { pattern = "gptapikeys.com/*", zone_name = "gptapikeys.com" },
  { pattern = "megacursos.com/*", zone_name = "megacursos.com" },
  { pattern = "cryptoupdated.com/*", zone_name = "cryptoupdated.com" },
  { pattern = "gpt-excel.com/*", zone_name = "gpt-excel.com" },
  { pattern = "autoword.ai/*", zone_name = "autoword.ai" },
  # REMOVED: autotinder.ai - hosted on Netlify
  { pattern = "dameapi.com/*", zone_name = "dameapi.com" },
  { pattern = "flywallex.com/*", zone_name = "flywallex.com" },
  { pattern = "gateway24h.com/*", zone_name = "gateway24h.com" },
  { pattern = "fintechmorning.com/*", zone_name = "fintechmorning.com" },
  { pattern = "visualingo.app/*", zone_name = "visualingo.app" },
  { pattern = "mcp.blue/*", zone_name = "mcp.blue" },
  { pattern = "sort.services/*", zone_name = "sort.services" },
  # REMOVED: agentsai.ltd - hosted on Netlify
  # REMOVED: ministerio.ai - returns TIMEOUT, site broken
  { pattern = "octbot.ai/*", zone_name = "octbot.ai" },
  { pattern = "www.octbot.ai/*", zone_name = "octbot.ai" },
  { pattern = "apilord.com/*", zone_name = "apilord.com" },
  { pattern = "gptabsolute.com/*", zone_name = "gptabsolute.com" },
  { pattern = "gpthard.com/*", zone_name = "gpthard.com" }
  ,
  # Newly added domains (unused → now routed by this worker)
  { pattern = "cryptoadiccion.com/*", zone_name = "cryptoadiccion.com" },
  { pattern = "www.cryptoadiccion.com/*", zone_name = "cryptoadiccion.com" },
  { pattern = "gptenespanol.com/*", zone_name = "gptenespanol.com" },
  { pattern = "www.gptenespanol.com/*", zone_name = "gptenespanol.com" },
  { pattern = "gptvenezuela.com/*", zone_name = "gptvenezuela.com" },
  { pattern = "www.gptvenezuela.com/*", zone_name = "gptvenezuela.com" },
  { pattern = "gptaddicts.com/*", zone_name = "gptaddicts.com" },
  { pattern = "www.gptaddicts.com/*", zone_name = "gptaddicts.com" },
  { pattern = "gptautoweb.com/*", zone_name = "gptautoweb.com" },
  { pattern = "www.gptautoweb.com/*", zone_name = "gptautoweb.com" },
  { pattern = "gptmundo.com/*", zone_name = "gptmundo.com" },
  { pattern = "www.gptmundo.com/*", zone_name = "gptmundo.com" },
  { pattern = "gptplugindatabase.com/*", zone_name = "gptplugindatabase.com" },
  { pattern = "www.gptplugindatabase.com/*", zone_name = "gptplugindatabase.com" },
  { pattern = "gptpowerpoint.com/*", zone_name = "gptpowerpoint.com" },
  { pattern = "www.gptpowerpoint.com/*", zone_name = "gptpowerpoint.com" },
  { pattern = "gptveteran.com/*", zone_name = "gptveteran.com" },
  { pattern = "www.gptveteran.com/*", zone_name = "gptveteran.com" },
  { pattern = "maximagpt.com/*", zone_name = "maximagpt.com" }
  ,{ pattern = "www.maximagpt.com/*", zone_name = "maximagpt.com" }
]
