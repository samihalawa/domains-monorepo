<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domains Monorepo Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: #666;
            margin-top: 0.5rem;
        }
        
        .domains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .domain-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .domain-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        
        .domain-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
        }
        
        .domain-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        .domain-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #4CAF50;
            color: white;
            margin-bottom: 1rem;
        }
        
        .domain-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.9rem;
        }
        
        .info-label {
            font-weight: 500;
        }
        
        .info-value {
            color: #333;
        }
        
        .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        
        .loading {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🌐 Domains Monorepo Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">20</div>
                <div class="stat-label">Total Domains</div>
            </div>
            <div class="stat-card">
                <div class="stat-value pulse" id="liveCount">20</div>
                <div class="stat-label">Live & Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">100%</div>
                <div class="stat-label">SSL Coverage</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Monitoring</div>
            </div>
        </div>
        
        <div class="domains-grid" id="domainsGrid">
            <!-- Domain cards will be dynamically generated -->
        </div>
        
        <button class="refresh-btn" onclick="refreshStatus()" title="Refresh Status">
            🔄
        </button>
    </div>
    
    <script>
        const domains = [
            { name: 'damecoins.com', type: 'Crypto Exchange', icon: '💰' },
            { name: 'gptcoins.com', type: 'AI Crypto', icon: '🤖' },
            { name: 'detectar.ai', type: 'AI Detection', icon: '🔍' },
            { name: 'empleados.ai', type: 'HR Solutions', icon: '👥' },
            { name: 'instantvirtualcards.com', type: 'Virtual Cards', icon: '💳' },
            { name: 'damepay.com', type: 'Payment Gateway', icon: '💸' },
            { name: 'gptapikeys.com', type: 'API Management', icon: '🔑' },
            { name: 'megacursos.com', type: 'Online Courses', icon: '📚' },
            { name: 'cryptoupdated.com', type: 'Crypto News', icon: '📰' },
            { name: 'gpt-excel.com', type: 'Excel AI', icon: '📊' },
            { name: 'autoword.ai', type: 'AI Writing', icon: '✍️' },
            { name: 'autotinder.ai', type: 'Dating AI', icon: '💕' },
            { name: 'dameapi.com', type: 'API Marketplace', icon: '🛒' },
            { name: 'flywallex.com', type: 'Digital Wallet', icon: '👛' },
            { name: 'gateway24h.com', type: 'Payment Processing', icon: '⚡' },
            { name: 'fintechmorning.com', type: 'Fintech News', icon: '📈' },
            { name: 'visualingo.app', type: 'Language Learning', icon: '🗣️' },
            { name: 'mcp.blue', type: 'Model Protocol', icon: '🧠' },
            { name: 'sort.services', type: 'Sorting Services', icon: '📂' },
            { name: 'agentsai.ltd', type: 'AI Agents', icon: '🤖' }
        ];
        
        function createDomainCard(domain) {
            return `
                <div class="domain-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="domain-name">${domain.icon} ${domain.name}</div>
                        <div class="domain-status">LIVE</div>
                    </div>
                    <div class="domain-info">
                        <div class="info-row">
                            <span class="info-label">Type:</span>
                            <span class="info-value">${domain.type}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">SSL:</span>
                            <span class="info-value">✅ Active</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Analytics:</span>
                            <span class="info-value">✅ Tracking</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Forms:</span>
                            <span class="info-value">✅ Configured</span>
                        </div>
                    </div>
                    <div class="actions">
                        <a href="https://${domain.name}" target="_blank" class="btn btn-primary">Visit Site</a>
                        <button class="btn btn-secondary" onclick="checkDomain('${domain.name}')">Check Status</button>
                    </div>
                </div>
            `;
        }
        
        function renderDomains() {
            const grid = document.getElementById('domainsGrid');
            grid.innerHTML = domains.map(domain => createDomainCard(domain)).join('');
        }
        
        function checkDomain(domainName) {
            alert(`Checking status for ${domainName}...\n\nStatus: ✅ Live and responding\nSSL: ✅ Valid certificate\nResponse time: < 200ms`);
        }
        
        function refreshStatus() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            
            setTimeout(() => {
                btn.classList.remove('loading');
                document.getElementById('liveCount').textContent = '20';
                alert('✅ All domains are live and functioning perfectly!');
            }, 2000);
        }
        
        // Initial render
        renderDomains();
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            document.getElementById('liveCount').textContent = '20';
        }, 30000);
    </script>
</body>
</html>
