<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain Control Center - Mail Style Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --glass: rgba(255,255,255,0.05);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .bulk-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: var(--accent-blue);
      border-radius: 16px;
      font-size: 12px;
    }
    
    .bulk-count {
      color: white;
      font-weight: 500;
    }
    
    .btn-sm {
      padding: 4px 8px;
      font-size: 11px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
    }
    
    .btn-sm:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .header-tools {
      display: flex;
      gap: 8px;
    }
    
    .header-tools .btn {
      padding: 6px 10px;
      font-size: 11px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    
    .main-container {
      display: flex;
      height: 100vh;
      padding-top: 60px;
    }
    
    /* Domain List (Left Panel) */
    .domain-list {
      width: 400px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    
    .list-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--glass);
    }
    
    .list-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .search-bar {
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-direction: column;
    }
    
    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--accent-blue);
    }
    
    .filter-row {
      display: flex;
      gap: 8px;
    }
    
    .filter-select {
      flex: 1;
      padding: 6px 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
    }
    
    .stats-row {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .stat-value {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .domain-items {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    
    .domain-item {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    
    .domain-item:hover {
      background: var(--glass);
    }
    
    .domain-item.selected {
      background: rgba(59, 130, 246, 0.1);
      border-left: 3px solid var(--accent-blue);
    }
    
    .domain-item.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }
    
    .domain-item.drag-over {
      border-top: 2px solid var(--accent-blue);
    }
    
    .domain-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    
    .domain-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .pill {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    .pill-active {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }
    
    .pill-pending {
      background: rgba(245, 158, 11, 0.2);
      color: var(--accent-yellow);
    }
    
    .pill-inactive {
      background: rgba(239, 68, 68, 0.2);
      color: var(--accent-red);
    }
    
    .muted {
      color: var(--text-secondary);
      font-size: 11px;
    }
    
    /* Detail Panel (Right Panel) */
    .detail-panel {
      flex: 1;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
    }
    
    .detail-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: var(--glass);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .detail-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    
    .detail-sub {
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .btn {
      padding: 8px 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .btn:hover {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }
    
    .btn-primary {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }
    
    .detail-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .detail-left {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    .detail-right {
      width: 400px;
      border-left: 1px solid var(--border);
      background: var(--bg-secondary);
      overflow-y: auto;
    }
    
    .panel {
      margin-bottom: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .panel-title {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      background: var(--glass);
    }
    
    .panel-content {
      padding: 16px;
    }
    
    .preview-frame {
      width: 100%;
      height: 400px;
      border: none;
      background: white;
      border-radius: 6px;
    }
    
    .dns-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .dns-row {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-family: 'Monaco', monospace;
      font-size: 12px;
    }
    
    .dns-row:last-child {
      border-bottom: none;
    }
    
    .dns-row code {
      background: var(--glass);
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 8px;
    }
    
    .form-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    .form-row input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 12px;
    }
    
    .form-row .btn {
      padding: 8px 12px;
      font-size: 12px;
    }
    
    .post-row {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .post-row:last-child {
      border-bottom: none;
    }
    
    .post-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-secondary);
      font-size: 16px;
    }
    
    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--glass) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 4px;
    }
    
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .skeleton-domain {
      height: 60px;
      margin-bottom: 8px;
      border-radius: 8px;
    }
    
    .skeleton-line {
      height: 12px;
      margin-bottom: 8px;
      border-radius: 6px;
    }
    
    .skeleton-line.short {
      width: 60%;
    }
    
    .skeleton-line.medium {
      width: 80%;
    }
    
    /* Modal for admin panels */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .modal.open {
      display: flex;
    }
    
    .modal-content {
      width: 90vw;
      height: 85vh;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass);
    }
    
    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }
    
    .modal-frame {
      flex: 1;
      border: none;
      background: white;
    }
    
    /* Notifications */
    .notifications-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 320px;
    }
    
    .notification {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transform: translateX(100%);
      animation: slideInRight 0.3s ease forwards;
    }
    
    .notification.success {
      border-left: 4px solid var(--accent-green);
    }
    
    .notification.error {
      border-left: 4px solid var(--accent-red);
    }
    
    .notification.info {
      border-left: 4px solid var(--accent-blue);
    }
    
    .notification.warning {
      border-left: 4px solid var(--accent-yellow);
    }
    
    @keyframes slideInRight {
      to { transform: translateX(0); }
    }
    
    .notification.dismissing {
      animation: slideOutRight 0.3s ease forwards;
    }
    
    @keyframes slideOutRight {
      to { transform: translateX(100%); opacity: 0; }
    }
    
    /* Analytics */
    .analytics-stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    
    .stat-label {
      color: var(--text-secondary);
    }
    
    .stat-value {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    /* Context Menu */
    .context-menu {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      z-index: 4000;
      display: none;
      padding: 4px 0;
      min-width: 150px;
    }
    
    .context-item {
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 13px;
    }
    
    .context-item:hover {
      background: var(--glass);
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .detail-body {
        flex-direction: column;
      }
      
      .detail-right {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 400px;
      }
    }
    
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }
      
      .domain-list {
        width: 100%;
        height: 300px;
      }
      
      .detail-right {
        display: none;
      }
      
      .detail-left {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🌐</div>
      <span>Domain Control Center</span>
    </div>
    <div class="header-actions">
      <div class="bulk-actions" id="bulk-actions" style="display: none;">
        <span class="bulk-count">0 selected</span>
        <button class="btn btn-sm" onclick="domainManager.bulkAction('admin')">Open Admin</button>
        <button class="btn btn-sm" onclick="domainManager.bulkAction('refresh')">Refresh</button>
        <button class="btn btn-sm" onclick="domainManager.clearSelection()">Clear</button>
      </div>
      <div class="header-tools">
        <button class="btn btn-sm" onclick="domainManager.exportData()" title="Export domain data">📁 Export</button>
        <button class="btn btn-sm" onclick="domainManager.toggleFullscreen()" title="Toggle fullscreen">⛶ Full</button>
      </div>
      <span id="connection-status" class="muted">Connecting...</span>
    </div>
  </header>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Domain List (Left Panel) -->
    <div class="domain-list">
      <div class="list-header">
        <div class="list-title">Domains</div>
        <div class="search-bar">
          <input type="text" id="domain-search" placeholder="Search domains..." class="search-input">
          <select id="status-filter" class="filter-select">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="inactive">Inactive</option>
          </select>
          <select id="provider-filter" class="filter-select">
            <option value="all">All Providers</option>
            <option value="cloudflare">Cloudflare</option>
            <option value="netlify">Netlify</option>
          </select>
        </div>
        <div class="stats-row">
          <div class="stat">
            <span>Total:</span>
            <span class="stat-value" data-stat="total-domains">-</span>
          </div>
          <div class="stat">
            <span>Active:</span>
            <span class="stat-value" data-stat="active-domains">-</span>
          </div>
          <div class="stat">
            <span>CF:</span>
            <span class="stat-value" data-stat="cloudflare-domains">-</span>
          </div>
          <div class="stat">
            <span>Netlify:</span>
            <span class="stat-value" data-stat="netlify-domains">-</span>
          </div>
        </div>
      </div>
      <div class="domain-items" id="domain-list">
        <div style="text-align: center; padding: 40px;">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>

    <!-- Detail Panel (Right Panel) -->
    <div class="detail-panel">
      <div id="detail">
        <div class="empty">Select a domain to view details</div>
      </div>
    </div>
  </div>

  <!-- Admin Panel Modal -->
  <div class="modal" id="admin-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Admin Panel</div>
        <button class="modal-close" onclick="domainManager.closeAdmin()">✕</button>
      </div>
      <iframe class="modal-frame" id="admin-frame" src="about:blank"></iframe>
    </div>
  </div>
  
  <!-- Notifications -->
  <div class="notifications-container" id="notifications"></div>
  
  <!-- Context Menu -->
  <div class="context-menu" id="context-menu">
    <div class="context-item" onclick="domainManager.contextAction('select')">📍 Select</div>
    <div class="context-item" onclick="domainManager.contextAction('admin')">⚙️ Admin Panel</div>
    <div class="context-item" onclick="domainManager.contextAction('open')">🌐 Open Site</div>
    <div class="context-item" onclick="domainManager.contextAction('copy')">📋 Copy URL</div>
    <div class="context-item" onclick="domainManager.contextAction('health')">❤️ Check Health</div>
  </div>

  <script src="js/domain-manager.js"></script>
  <script>
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Focus search on Ctrl/Cmd + F
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        document.getElementById('domain-search')?.focus();
      }
      
      // Escape to clear search
      if (e.key === 'Escape') {
        const searchInput = document.getElementById('domain-search');
        if (searchInput && document.activeElement === searchInput) {
          searchInput.value = '';
          searchInput.blur();
          domainManager.searchQuery = '';
          domainManager.applyFilters();
        }
      }
      
      // Arrow keys for domain navigation
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        domainManager.navigateDomains(e.key === 'ArrowDown' ? 1 : -1);
      }
    });
    
    // Auto-refresh every 30 seconds
    setInterval(() => {
      if (domainManager && !domainManager.loading) {
        domainManager.fetchAllDomains().then(() => {
          domainManager.renderDomainList();
        });
      }
    }, 30000);

    // Update connection status
    const updateStatus = (status, color = 'var(--accent-green)') => {
      const el = document.getElementById('connection-status');
      if (el) {
        el.textContent = status;
        el.style.color = color;
      }
    };

    // Monitor connection
    window.addEventListener('online', () => updateStatus('Connected'));
    window.addEventListener('offline', () => updateStatus('Offline', 'var(--accent-red)'));

    // Initial status
    updateStatus(navigator.onLine ? 'Connected' : 'Offline', 
                 navigator.onLine ? 'var(--accent-green)' : 'var(--accent-red)');
  </script>
</body>
</html>
